<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>雷电突击 THUNDER STRIKE11</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;font-family:'Rajdhani',sans-serif;cursor:none}
  #gameCanvas{display:block}
  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
  #hud{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start}
  .hud-left,.hud-right{display:flex;flex-direction:column;gap:6px}
  .hud-center{display:flex;flex-direction:column;align-items:center;gap:4px}
  .stat-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:#0af;text-transform:uppercase;opacity:.7}
  .stat-value{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 20px #0af,0 0 40px #0af}
  .score-value{font-size:32px;color:#ff0;text-shadow:0 0 20px #ff0,0 0 40px #fa0}
  .bar-container{width:180px;height:10px;background:rgba(255,255,255,.1);border:1px solid rgba(0,180,255,.3);border-radius:5px;overflow:hidden;position:relative}
  .bar-fill{height:100%;border-radius:5px;transition:width .1s;position:relative}
  .hp-bar{background:linear-gradient(90deg,#f00,#f50,#0f5);box-shadow:0 0 8px #0f5}
  .shield-bar{background:linear-gradient(90deg,#00f,#08f,#0af);box-shadow:0 0 8px #0af}
  .charge-bar{background:linear-gradient(90deg,#f0f,#80f,#ff0);box-shadow:0 0 8px #80f}
  .boss-bar-wrap{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:600px;display:none;flex-direction:column;align-items:center;gap:6px}
  .boss-name{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:4px;color:#f50;text-shadow:0 0 20px #f50}
  .boss-bar-bg{width:100%;height:16px;background:rgba(0,0,0,.6);border:1px solid #f50;border-radius:8px;overflow:hidden;box-shadow:0 0 20px rgba(255,80,0,.4)}
  .boss-bar-fill{height:100%;background:linear-gradient(90deg,#800,#f00,#f50,#ff0);border-radius:8px;transition:width .2s;box-shadow:0 0 10px #f50}
  .weapon-hud{display:flex;gap:8px;margin-top:4px}
  .weapon-slot{width:44px;height:44px;border:1px solid rgba(0,180,255,.3);border-radius:6px;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'Orbitron',monospace;font-size:8px;color:#0af;transition:all .2s}
  .weapon-slot.active{border-color:#ff0;background:rgba(255,200,0,.15);box-shadow:0 0 12px rgba(255,200,0,.5);color:#ff0}
  .weapon-slot .w-icon{font-size:18px}
  .lives{display:flex;gap:4px}
  .life-icon{font-size:16px;filter:drop-shadow(0 0 4px #0af)}
  #overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,5,.92)}
  #overlay.hidden{display:none}
  .overlay-title{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#0af,#fff,#ff0,#f50);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1;margin-bottom:8px;animation:titlePulse 2s ease-in-out infinite}
  .overlay-subtitle{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:6px;color:#0af;opacity:.7;margin-bottom:48px}
  @keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
  .btn{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;padding:14px 40px;border:1px solid #0af;background:rgba(0,180,255,.1);color:#0af;cursor:pointer;border-radius:4px;transition:all .2s;pointer-events:all;margin:6px;text-transform:uppercase}
  .btn:hover{background:rgba(0,180,255,.3);box-shadow:0 0 20px rgba(0,180,255,.5);transform:scale(1.05)}
  .btn.primary{border-color:#ff0;background:rgba(255,200,0,.15);color:#ff0}
  .btn.primary:hover{background:rgba(255,200,0,.3);box-shadow:0 0 20px rgba(255,200,0,.5)}
  .tips{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:2px;margin-top:32px;text-align:center;line-height:2}
  .stage-announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:36px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 40px #0af,0 0 80px #0af;z-index:50;pointer-events:none;opacity:0;transition:opacity .4s;white-space:pre-line;text-align:center}
  .stage-announce.show{opacity:1}
  #combo-display{position:absolute;right:20px;top:50%;transform:translateY(-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
  .combo-num{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:#ff0;text-shadow:0 0 20px #ff0,0 0 40px #fa0;line-height:1}
  .combo-text{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;color:#fa0}
  .minimap{width:80px;height:60px;border:1px solid rgba(0,180,255,.2);background:rgba(0,0,0,.4);border-radius:4px;position:relative;overflow:hidden}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="hud">
    <div class="hud-left">
      <div class="stat-label">HULL INTEGRITY</div>
      <div class="bar-container"><div class="bar-fill hp-bar" id="hpBar" style="width:100%"></div></div>
      <div class="stat-label">SHIELD</div>
      <div class="bar-container"><div class="bar-fill shield-bar" id="shieldBar" style="width:100%"></div></div>
      <div class="stat-label">SUPER CHARGE</div>
      <div class="bar-container"><div class="bar-fill charge-bar" id="chargeBar" style="width:0%"></div></div>
      <div class="lives" id="livesDisplay"></div>
    </div>
    <div class="hud-center">
      <div class="stat-label">SCORE</div>
      <div class="stat-value score-value" id="scoreDisplay">000000</div>
      <div class="stat-label">STAGE <span id="stageNum">01</span></div>
    </div>
    <div class="hud-right">
      <div class="stat-label">WEAPON</div>
      <div class="weapon-hud" id="weaponHud"></div>
    </div>
  </div>
  <div class="boss-bar-wrap" id="bossBar">
    <div class="boss-name" id="bossName">BOSS</div>
    <div class="boss-bar-bg"><div class="boss-bar-fill" id="bossBarFill" style="width:100%"></div></div>
  </div>
  <div id="combo-display">
    <div class="combo-num" id="comboNum">0</div>
    <div class="combo-text">COMBO</div>
  </div>
</div>

<div id="overlay">
  <div class="overlay-title">THUNDER<br>STRIKE</div>
  <div class="overlay-subtitle">雷电突击 · EXTREME ASSAULT</div>
  <div style="font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:rgba(0,180,255,.4);margin-bottom:32px">v1.0.3</div>
  <button class="btn primary" onclick="startGame()">▶ 开始战斗</button>
  <button class="btn" onclick="showControls()">操作说明</button>
  <div class="tips">
    鼠标移动 — 控制战机 &nbsp;|&nbsp; 自动射击<br>
    1/2/3 — 切换武器 &nbsp;|&nbsp; SPACE — 超级技能<br>
    击杀敌人积累能量 · 收集道具强化战机
  </div>
</div>

<div class="stage-announce" id="stageAnnounce"></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== GAME STATE =====
let state = 'menu';
let score = 0, lives = 3, stage = 1, wave = 0;
let combo = 0, comboTimer = 0, maxCombo = 0;
let frame = 0, stageTimer = 0;
const WEAPONS = [
  {name:'VULCAN', icon:'⚡', color:'#0af', key:'1'},
  {name:'LASER',  icon:'🔴', color:'#f00', key:'2'},
  {name:'SPREAD', icon:'💠', color:'#0f8', key:'3'},
];
let currentWeapon = 0;
let superCharge = 0, superMax = 100;
let superActive = false, superTimer = 0;
let bossActive = false, bonusActive = false;

// ===== PLAYER =====
const player = {
  x:0, y:0, tx:0, ty:0,
  w:38, h:52,
  hp:100, maxHp:100,
  shield:100, maxShield:100,
  shieldRegen:0,
  invincible:0,
  trail:[],
  powerLevel:1,
  shootTimer:0,
  shootRate:8,
  dead:false,
};

// ===== ARRAYS =====
let bullets=[], enemyBullets=[], enemies=[], particles=[], pickups=[], bossBullets=[];
let boss=null, lightning=[];
let bgStars=[], bgNebula=[];
let screenShake=0, shakeX=0, shakeY=0;
let mouseX=W/2, mouseY=H/2;

// ===== HUD throttle =====
let hudDirty = true;

// ===== INPUT =====
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&state==='playing'){e.preventDefault();activateSuper();}
  if(e.key==='1'){currentWeapon=0;hudDirty=true;}
  if(e.key==='2'){currentWeapon=1;hudDirty=true;}
  if(e.key==='3'){currentWeapon=2;hudDirty=true;}
});

// ===== INIT =====
function initBg(){
  bgStars=[];
  for(let i=0;i<300;i++){
    bgStars.push({x:Math.random()*3000,y:Math.random()*2000,r:Math.random()*1.5+.3,spd:Math.random()*2+.5,bright:Math.random()});
  }
  bgNebula=[];
  for(let i=0;i<8;i++){
    bgNebula.push({x:Math.random()*W,y:Math.random()*H,rx:Math.random()*200+100,ry:Math.random()*120+60,
      hue:Math.random()*360,a:Math.random()*.12+.03,spd:Math.random()*1+.3});
  }
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  state='playing';
  score=0;lives=3;stage=1;wave=0;combo=0;maxCombo=0;superCharge=0;
  bullets=[];enemyBullets=[];enemies=[];particles=[];pickups=[];bossBullets=[];
  bossActive=false;bonusActive=false;boss=null;lightning=[];
  player.x=W/2;player.y=H*.75;player.tx=W/2;player.ty=H*.75;
  player.hp=player.maxHp;player.shield=player.maxShield;
  player.invincible=0;player.dead=false;player.powerLevel=1;
  player.shootTimer=0;player.trail=[];player.shieldRegen=0;
  currentWeapon=0;superActive=false;superTimer=0;
  frame=0;stageTimer=0;
  screenShake=0;
  initBg();
  hudDirty=true;
  updateHUD();
  announceStage('STAGE '+String(stage).padStart(2,'0'));
  spawnWave();
}

function showControls(){
  alert('鼠标移动控制战机\n自动射击\n1/2/3切换武器\nSPACE激活超级技能\n击杀积累超能量条\n收集道具补充能量和强化武器');
}

// ===== SPAWN =====
const ENEMY_TYPES=[
  {type:'scout',   hp:30,  spd:2.5, size:20, score:100, color:'#0ff', pattern:'straight', shootRate:80},
  {type:'fighter', hp:60,  spd:1.8, size:28, score:200, color:'#f80', pattern:'zigzag',   shootRate:60},
  {type:'bomber',  hp:120, spd:1.2, size:38, score:400, color:'#f0f', pattern:'dive',     shootRate:45},
  {type:'carrier', hp:200, spd:0.8, size:50, score:800, color:'#8f0', pattern:'orbit',    shootRate:100},
  {type:'elite',   hp:300, spd:2.0, size:32, score:600, color:'#ff0', pattern:'homing',   shootRate:40},
];

function spawnWave(){
  wave++;
  let count=4+wave*2+stage*2;
  let types=Math.min(wave,ENEMY_TYPES.length);
  for(let i=0;i<count;i++){
    let t=ENEMY_TYPES[Math.floor(Math.random()*types)];
    enemies.push({
      ...t,
      x:Math.random()*(W-80)+40,
      y:-60-i*50,
      vx:(Math.random()-.5)*1.5,
      vy:t.spd,
      maxHp:t.hp,
      angle:0,
      shootTimer:Math.floor(Math.random()*t.shootRate),
      phase:Math.random()*Math.PI*2,
      orbitR:80+Math.random()*60,
      orbitCX:Math.random()*W,
      orbitCY:H*.3,
      alive:true,
      hitFlash:0,
      spawnTime:frame+i*15,
    });
  }
}

function spawnBoss(){
  bossActive=true;
  const BOSSES=[
    {name:'PLASMA OVERLORD', hp:5000,  color:'#f50', size:80},
    {name:'DARK NEBULA',     hp:8000,  color:'#80f', size:95},
    {name:'IRON TITAN',      hp:12000, color:'#0f8', size:110},
  ];
  let b=BOSSES[Math.min(stage-1,BOSSES.length-1)];
  boss={
    ...b, maxHp:b.hp,
    x:W/2, y:-120,
    tx:W/2, ty:H*.22,
    vx:0, vy:2,
    angle:0,
    shootTimer:0,
    phase:1,
    alive:true,
    hitFlash:0,
    patternTimer:0,
    patternPhase:0,
  };
  document.getElementById('bossBar').style.display='flex';
  document.getElementById('bossName').textContent=boss.name;
  announceStage('⚠ BOSS ⚠\n'+boss.name);
}

function spawnBonusStage(){
  bonusActive=true;
  enemies=[];enemyBullets=[];
  for(let i=0;i<30;i++){
    enemies.push({
      type:'bonus',hp:20,spd:2,size:22,score:500,color:'#ff0',
      pattern:'straight',shootRate:9999,
      x:Math.random()*(W-80)+40,y:-40-i*30,
      vx:(Math.random()-.5)*2,vy:2,
      maxHp:20,angle:0,shootTimer:0,phase:0,
      alive:true,hitFlash:0,spawnTime:frame+i*8,
      bonus:true,
    });
  }
  announceStage('★ BONUS STAGE ★\n全力击杀！');
}

// ===== SHOOTING =====
function playerShoot(){
  if(player.dead) return;
  const w=WEAPONS[currentWeapon];
  const px=player.x, py=player.y-player.h/2;
  if(w.name==='VULCAN'){
    let spread=player.powerLevel>1?[-6,0,6]:[-3,3];
    if(player.powerLevel===3) spread=[-9,-3,3,9];
    for(let s of spread){
      bullets.push({x:px+s,y:py,vx:s*.08,vy:-16,w:3,h:12,color:'#0af',type:'vulcan',dmg:15*player.powerLevel,life:60,trail:[]});
    }
    if(player.powerLevel>=2){
      bullets.push({x:px,y:py+10,vx:0,vy:-16,w:3,h:16,color:'#fff',type:'vulcan',dmg:20*player.powerLevel,life:60,trail:[]});
    }
  } else if(w.name==='LASER'){
    bullets.push({x:px,y:py,vx:0,vy:-26,w:6,h:20,color:'#f53',type:'laser',dmg:40*player.powerLevel,life:40,trail:[],glow:true});
    bullets.push({x:px-4,y:py+8,vx:-.3,vy:-22,w:3,h:14,color:'#f00',type:'laser',dmg:20,life:40,trail:[]});
    bullets.push({x:px+4,y:py+8,vx:.3,vy:-22,w:3,h:14,color:'#f00',type:'laser',dmg:20,life:40,trail:[]});
  } else if(w.name==='SPREAD'){
    let count=4+player.powerLevel*2;
    for(let i=0;i<count;i++){
      let a=-Math.PI/2 + (i-(count-1)/2)*(Math.PI/(count+2));
      bullets.push({x:px,y:py,vx:Math.cos(a)*14,vy:Math.sin(a)*14,w:5,h:5,color:'#0f8',type:'spread',dmg:18*player.powerLevel,life:50,trail:[]});
    }
  }
  spawnParticles(px,py,w.color,3,2);
}

function enemyShoot(e){
  if(e.type==='bonus') return;
  let dx=player.x-e.x, dy=player.y-e.y;
  let dist=Math.sqrt(dx*dx+dy*dy)||1;
  let spd=e.type==='elite'?8:5;
  let vx=(dx/dist)*spd, vy=(dy/dist)*spd;
  if(e.type==='bomber'){
    for(let i=-1;i<=1;i++){
      enemyBullets.push({x:e.x,y:e.y,vx:vx+i*.5,vy:vy+i*.2,r:4,color:'#f0f',dmg:15,life:80});
    }
  } else if(e.type==='carrier'){
    for(let i=0;i<6;i++){
      let a=(i/6)*Math.PI*2+e.angle;
      enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:3,color:'#8f0',dmg:10,life:100});
    }
  } else {
    enemyBullets.push({x:e.x,y:e.y,vx,vy,r:4,color:e.color,dmg:12,life:80});
  }
}

function bossShoot(){
  if(!boss||!boss.alive) return;
  const bp=boss.patternPhase;
  if(bp===0){
    for(let i=0;i<12;i++){
      let a=(i/12)*Math.PI*2+boss.angle;
      bossBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,r:5,color:boss.color,dmg:20,life:120,type:'normal'});
    }
  } else if(bp===1){
    let dx=player.x-boss.x,dy=player.y-boss.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    for(let i=-1;i<=1;i++){
      bossBullets.push({x:boss.x,y:boss.y,vx:(dx/d)*7+i,vy:(dy/d)*7,r:6,color:'#f80',dmg:25,life:100,type:'aimed'});
    }
  } else if(bp===2){
    for(let i=0;i<W;i+=60){
      bossBullets.push({x:i,y:boss.y+50,vx:0,vy:3,r:8,color:'#f00',dmg:30,life:150,type:'wall'});
    }
  } else if(bp===3){
    bossBullets.push({x:boss.x,y:boss.y,vx:0,vy:3,r:7,color:'#80f',dmg:20,life:200,type:'homing',target:true});
  }
}

// ===== PARTICLES =====
function spawnParticles(x,y,color,count=10,spd=4,big=false){
  if(particles.length>600) return;
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let s=Math.random()*spd+1;
    particles.push({
      x,y,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      r:big?Math.random()*5+3:Math.random()*3+1,
      color,
      life:Math.random()*30+20,
      maxLife:50,
      type:'spark'
    });
  }
}

function spawnExplosion(x,y,color,size=1){
  if(particles.length>600) return;
  screenShake=Math.max(screenShake,8*size);
  let count=Math.min(Math.floor(15*size),20);
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let s=Math.random()*8*size+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*5*size+1.5,color,life:Math.random()*35+20,maxLife:55,type:'explosion'});
  }
  particles.push({x,y,r:5,maxR:70*size,color,life:25,maxLife:25,type:'ring'});
  particles.push({x,y,r:35*size,color:'#fff',life:7,maxLife:7,type:'flash'});
}

function spawnLightning(x1,y1,x2,y2,color='#0af',width=2){
  lightning.push({x1,y1,x2,y2,color,width,life:8,maxLife:8,segs:generateLightningSegs(x1,y1,x2,y2)});
}

function generateLightningSegs(x1,y1,x2,y2){
  let pts=[{x:x1,y:y1}];
  let steps=8;
  for(let i=1;i<steps;i++){
    let t=i/steps;
    let mx=x1+(x2-x1)*t+(Math.random()-.5)*60;
    let my=y1+(y2-y1)*t+(Math.random()-.5)*30;
    pts.push({x:mx,y:my});
  }
  pts.push({x:x2,y:y2});
  return pts;
}

// ===== PICKUPS =====
function spawnPickup(x,y,type){
  pickups.push({x,y,vy:1.5,type,life:300,angle:0,
    color:type==='hp'?'#0f5':type==='shield'?'#08f':type==='charge'?'#ff0':type==='power'?'#f0f':'#fff'});
}

// ===== COLLISION =====
function rectCircle(rx,ry,rw,rh,cx,cy,cr){
  let nearX=Math.max(rx-rw/2,Math.min(rx+rw/2,cx));
  let nearY=Math.max(ry-rh/2,Math.min(ry+rh/2,cy));
  let dx=nearX-cx,dy=nearY-cy;
  return dx*dx+dy*dy<cr*cr;
}

// ===== SUPER SKILL =====
function activateSuper(){
  if(superCharge<superMax||superActive) return;
  superActive=true;superTimer=180;superCharge=0;
  hudDirty=true;
  announceStage('⚡ THUNDER STRIKE ⚡');
  for(let i=0;i<15;i++){
    setTimeout(()=>{
      enemies.forEach(e=>{
        if(e.alive && Math.random()<.7){
          spawnLightning(player.x,player.y,e.x,e.y,'#ff0',3);
          e.hp-=200;e.hitFlash=5;
          if(e.hp<=0) killEnemy(e);
        }
      });
      if(boss&&boss.alive){
        spawnLightning(player.x,player.y,boss.x,boss.y,'#ff0',5);
        boss.hp-=500;boss.hitFlash=5;
      }
    },i*80);
  }
  screenShake=15;
  spawnParticles(player.x,player.y,'#ff0',50,12,true);
}

// ===== FIX: killEnemy — set alive=false FIRST to prevent multi-bullet same-frame double kill =====
function killEnemy(e){
  if(!e.alive) return;      // guard: already processed
  e.alive = false;          // ← MUST be set before any score/combo logic
  score += e.score * (combo > 5 ? 2 : 1);
  combo++;
  comboTimer = 120;
  if(combo > maxCombo) maxCombo = combo;
  superCharge = Math.min(superMax, superCharge + (e.type==='bonus' ? 8 : 5));
  let expSize = Math.min(e.size / 30, 1.5);
  spawnExplosion(e.x, e.y, e.color, expSize);
  if(Math.random() < (e.type==='bonus' ? 0.8 : 0.25))
    spawnPickup(e.x, e.y, ['hp','shield','charge','power'][Math.floor(Math.random()*4)]);
  hudDirty = true;
}

// ===== UPDATE =====
function update(){
  if(state!=='playing') return;
  frame++;stageTimer++;

  screenShake*=0.85;
  shakeX=(Math.random()-.5)*screenShake;
  shakeY=(Math.random()-.5)*screenShake;

  // Player movement
  player.tx=mouseX;player.ty=mouseY;
  player.x+=(player.tx-player.x)*.12;
  player.y+=(player.ty-player.y)*.12;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  player.y=Math.max(player.h/2,Math.min(H-player.h/2,player.y));

  // Player trail
  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>12) player.trail.shift();

  // Shield regen
  player.shieldRegen++;
  if(player.shieldRegen>120 && player.shield<player.maxShield){
    player.shield=Math.min(player.maxShield,player.shield+0.2);
    hudDirty=true;
  }

  // Player shoot
  player.shootTimer++;
  let rate=currentWeapon===2?16:(currentWeapon===1?12:player.shootRate);
  if(superActive) rate=4;
  if(player.shootTimer>=rate){
    player.shootTimer=0;
    playerShoot();
  }

  // Super timer
  if(superActive){
    superTimer--;
    if(superTimer<=0){superActive=false;}
  }

  // Invincibility
  if(player.invincible>0) player.invincible--;

  // Combo decay
  if(comboTimer>0){comboTimer--;if(comboTimer===0){combo=0;hudDirty=true;}}
  updateComboDisplay();

  // Update player bullets — check enemies AFTER alive flag is reliable
  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>6) b.trail.shift();
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20||b.life<=0) return false;
    let hit=false;
    for(let ei=0;ei<enemies.length;ei++){
      let e=enemies[ei];
      if(!e.alive) continue;               // skip already-dead enemies
      if(frame<e.spawnTime) continue;
      if(rectCircle(e.x,e.y,e.size,e.size,b.x,b.y,b.w||5)){
        e.hp-=b.dmg;
        e.hitFlash=5;
        spawnParticles(b.x,b.y,b.color,4,3);
        if(b.type==='laser') spawnLightning(b.x,b.y,e.x,e.y,b.color,1);
        if(e.hp<=0) killEnemy(e);  // killEnemy sets alive=false immediately
        hit=true;
        break;
      }
    }
    if(!hit && boss&&boss.alive){
      if(rectCircle(boss.x,boss.y,boss.size,boss.size,b.x,b.y,b.w||5)){
        boss.hp-=b.dmg;boss.hitFlash=5;
        spawnParticles(b.x,b.y,b.color,4,3);
        hit=true;
      }
    }
    return !hit;
  });

  // Update enemy bullets
  enemyBullets=enemyBullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.x<0||b.x>W||b.y<0||b.y>H||b.life<=0) return false;
    if(!player.dead && player.invincible<=0){
      if(rectCircle(player.x,player.y,player.w,player.h,b.x,b.y,b.r+4)){
        playerHit(b.dmg);
        spawnParticles(player.x,player.y,'#f80',6,4);
        return false;
      }
    }
    return true;
  });

  // Boss bullets
  bossBullets=bossBullets.filter(b=>{
    if(b.type==='homing'){
      let dx=player.x-b.x,dy=player.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      b.vx+=(dx/d)*.3;b.vy+=(dy/d)*.3;
      let spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if(spd>7){b.vx*=7/spd;b.vy*=7/spd;}
    }
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.x<0||b.x>W||b.y<-20||b.y>H+20||b.life<=0) return false;
    if(!player.dead && player.invincible<=0){
      if(rectCircle(player.x,player.y,player.w,player.h,b.x,b.y,b.r+4)){
        playerHit(b.dmg);
        spawnParticles(player.x,player.y,'#f00',8,5);
        return false;
      }
    }
    return true;
  });

  // Update enemies
  enemies.forEach(e=>{
    if(!e.alive) return;
    if(frame<e.spawnTime) return;
    e.angle+=.03;
    e.phase+=.02;
    e.hitFlash=Math.max(0,e.hitFlash-1);
    if(e.pattern==='straight'){
      e.x+=e.vx;e.y+=e.vy;
      if(e.x<e.size||e.x>W-e.size) e.vx*=-1;
    } else if(e.pattern==='zigzag'){
      e.x+=Math.sin(e.phase*2)*3+e.vx;
      e.y+=e.vy;
      if(e.x<e.size||e.x>W-e.size) e.vx*=-1;
    } else if(e.pattern==='dive'){
      let tx=player.x, ty=player.y;
      let dx=tx-e.x, dy=ty-e.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      e.x+=dx/d*e.spd*1.5;
      e.y+=dy/d*e.spd*.8+e.vy*.3;
    } else if(e.pattern==='orbit'){
      e.orbitCX+=.5;
      e.x=e.orbitCX+Math.cos(e.phase)*e.orbitR;
      e.y=e.orbitCY+Math.sin(e.phase)*e.orbitR*.5;
    } else if(e.pattern==='homing'){
      let dx=player.x-e.x, dy=player.y-e.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      e.vx+=(dx/d)*.15;e.vy+=(dy/d)*.15;
      let spd=Math.sqrt(e.vx*e.vx+e.vy*e.vy);
      if(spd>e.spd){e.vx*=e.spd/spd;e.vy*=e.spd/spd;}
      e.x+=e.vx;e.y+=e.vy;
    }
    // Shooting
    e.shootTimer++;
    if(e.shootTimer>=e.shootRate){
      e.shootTimer=0;
      if(e.y>0 && e.y<H) enemyShoot(e);
    }
    // Off-screen removal
    if(e.y>H+60) e.alive=false;
    // Collision with player
    if(!player.dead && player.invincible<=0){
      if(rectCircle(player.x,player.y,player.w,player.h,e.x,e.y,e.size)){
        playerHit(30);
        e.hp-=50;
        if(e.hp<=0) killEnemy(e);
      }
    }
  });
  // Purge dead enemies after all updates this frame
  enemies=enemies.filter(e=>e.alive);

  // Boss update
  if(boss&&boss.alive){
    boss.angle+=.015;
    boss.patternTimer++;
    boss.hitFlash=Math.max(0,boss.hitFlash-1);
    boss.x+=(boss.tx-boss.x)*.018;
    boss.y+=(boss.ty-boss.y)*.018;
    if(boss.patternTimer%200===0){
      boss.patternPhase=(boss.patternPhase+1)%4;
      let targets=[[W*.3,H*.2],[W*.7,H*.2],[W*.5,H*.15],[W*.5,H*.25]];
      let t=targets[boss.patternPhase];
      boss.tx=t[0];boss.ty=t[1];
    }
    boss.shootTimer++;
    let bRate=boss.hp<boss.maxHp*.5?20:35;
    if(boss.shootTimer>=bRate){
      boss.shootTimer=0;
      bossShoot();
    }
    if(boss.hp<boss.maxHp*.3 && boss.phase===1){
      boss.phase=2;
      announceStage('⚠ ENRAGE ⚠');
      screenShake=20;
    }
    if(boss.hp<=0){
      spawnExplosion(boss.x,boss.y,boss.color,3);
      for(let i=0;i<3;i++) setTimeout(()=>spawnExplosion(boss.x+(Math.random()-.5)*80,boss.y+(Math.random()-.5)*60,boss.color,2),i*200);
      score+=5000*stage;
      boss.alive=false;
      bossActive=false;
      document.getElementById('bossBar').style.display='none';
      bossBullets=[];
      hudDirty=true;
      setTimeout(()=>nextStage(),2000);
    }
    let pct=Math.max(0,boss.hp/boss.maxHp*100);
    document.getElementById('bossBarFill').style.width=pct+'%';
    if(!player.dead && player.invincible<=0){
      if(rectCircle(player.x,player.y,player.w,player.h,boss.x,boss.y,boss.size+10)){
        playerHit(50);
      }
    }
  }

  // Pickups
  pickups=pickups.filter(p=>{
    p.y+=p.vy;p.angle+=.05;p.life--;
    if(p.y>H+20||p.life<=0) return false;
    if(rectCircle(player.x,player.y,player.w,player.h,p.x,p.y,18)){
      applyPickup(p);
      spawnParticles(p.x,p.y,p.color,8,4);
      return false;
    }
    return true;
  });

  // Particles
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=.92;p.vy*=.92;
    p.life--;
    if(p.type==='ring'){p.r+=(p.maxR-5)/p.maxLife*3;}
    return p.life>0;
  });

  // Lightning decay
  lightning=lightning.filter(l=>{l.life--;return l.life>0;});

  // BG stars scroll
  bgStars.forEach(s=>{
    s.y+=s.spd*(superActive?3:1);
    if(s.y>H+2) s.y=-2;
  });

  // Wave management
  if(!bossActive && !bonusActive){
    let alive=enemies.filter(e=>e.alive).length;
    if(alive===0 && stageTimer>120){
      stageTimer=0;
      if(wave>=4){
        spawnBoss();
      } else {
        spawnWave();
      }
    }
  }
  if(bonusActive){
    let alive=enemies.filter(e=>e.alive).length;
    if(alive===0){bonusActive=false;announceStage('BONUS END!');}
  }

  // Throttled HUD update
  if(hudDirty || frame%10===0){
    hudDirty=false;
    updateHUD();
  }
}

function playerHit(dmg){
  if(player.dead) return;
  player.shieldRegen=0;
  if(player.shield>0){
    let absorbed=Math.min(player.shield,dmg);
    player.shield-=absorbed;
    dmg-=absorbed;
    screenShake=Math.max(screenShake,5);
  }
  if(dmg>0){
    player.hp-=dmg;
    screenShake=Math.max(screenShake,10);
    player.invincible=45;
    hudDirty=true;
    if(player.hp<=0){
      player.hp=0;
      playerDie();
    }
  }
}

function playerDie(){
  if(player.dead) return;
  player.dead=true;
  player.invincible=999;
  spawnExplosion(player.x,player.y,'#f80',2.5);
  lives--;
  hudDirty=true;
  if(lives<=0){
    setTimeout(()=>gameOver(),1500);
  } else {
    setTimeout(()=>{
      player.dead=false;
      player.hp=player.maxHp;
      player.shield=player.maxShield;
      player.invincible=180;
      player.x=W/2;player.y=H*.75;
      hudDirty=true;
    },1500);
  }
}

function applyPickup(p){
  if(p.type==='hp') player.hp=Math.min(player.maxHp,player.hp+30);
  if(p.type==='shield') player.shield=Math.min(player.maxShield,player.shield+40);
  if(p.type==='charge') superCharge=Math.min(superMax,superCharge+25);
  if(p.type==='power') player.powerLevel=Math.min(3,player.powerLevel+1);
  hudDirty=true;
}

function nextStage(){
  stage++;wave=0;stageTimer=0;
  enemies=[];enemyBullets=[];bossBullets=[];
  document.getElementById('stageNum').textContent=String(stage).padStart(2,'0');
  if(stage%3===0){
    spawnBonusStage();
  } else if(stage>6){
    gameWin();
  } else {
    announceStage('STAGE '+String(stage).padStart(2,'0'));
    spawnWave();
  }
}

function gameOver(){
  state='gameover';
  let ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`<div class="overlay-title" style="color:#f53;-webkit-text-fill-color:#f53">GAME<br>OVER</div>
  <div class="overlay-subtitle">最高连击 ${maxCombo}x</div>
  <div class="stat-value score-value" style="margin:20px 0">${String(score).padStart(8,'0')}</div>
  <button class="btn primary" onclick="startGame()">▶ 再战一局</button>
  <button class="btn" onclick="location.reload()">返回主菜单</button>`;
}

function gameWin(){
  state='win';
  let ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`<div class="overlay-title" style="font-size:40px">MISSION<br>COMPLETE</div>
  <div class="overlay-subtitle">★ ALL STAGES CLEARED ★</div>
  <div class="stat-value score-value" style="margin:20px 0">${String(score).padStart(8,'0')}</div>
  <button class="btn primary" onclick="startGame()">▶ 再战一局</button>`;
}

let announceTimeout=null;
function announceStage(txt){
  let el=document.getElementById('stageAnnounce');
  el.textContent=txt;
  el.classList.add('show');
  if(announceTimeout) clearTimeout(announceTimeout);
  announceTimeout=setTimeout(()=>el.classList.remove('show'),2000);
}

// ===== HUD =====
function updateHUD(){
  document.getElementById('hpBar').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('shieldBar').style.width=(player.shield/player.maxShield*100)+'%';
  document.getElementById('chargeBar').style.width=(superCharge/superMax*100)+'%';
  document.getElementById('scoreDisplay').textContent=String(score).padStart(8,'0');
  let lv=document.getElementById('livesDisplay');
  lv.innerHTML='';
  for(let i=0;i<lives;i++) lv.innerHTML+='<span class="life-icon">✈</span>';
  let wh=document.getElementById('weaponHud');
  wh.innerHTML='';
  WEAPONS.forEach((w,i)=>{
    wh.innerHTML+=`<div class="weapon-slot ${i===currentWeapon?'active':''}">
      <div class="w-icon">${w.icon}</div>
      <div>${w.key}</div>
    </div>`;
  });
}

function updateComboDisplay(){
  let el=document.getElementById('combo-display');
  if(combo>=3){
    el.style.opacity='1';
    document.getElementById('comboNum').textContent=combo+'x';
  } else {
    el.style.opacity='0';
  }
}

// ===== DRAW =====
function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);

  ctx.fillStyle='#000005';
  ctx.fillRect(-5,-5,W+10,H+10);

  // Nebula
  bgNebula.forEach(n=>{
    n.y+=n.spd*.1;if(n.y>H+200) n.y=-200;
    let g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.rx);
    g.addColorStop(0,`hsla(${n.hue},80%,50%,${n.a})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.ellipse(n.x,n.y,n.rx,n.ry,0,0,Math.PI*2);ctx.fill();
  });

  // Stars
  bgStars.forEach(s=>{
    let a=.4+s.bright*.6+(Math.sin(frame*.02+s.y)*.15);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(s.x%W,s.y,s.r,0,Math.PI*2);ctx.fill();
    if(s.spd>2){
      ctx.strokeStyle=`rgba(150,200,255,${a*.5})`;
      ctx.lineWidth=s.r*.5;
      ctx.beginPath();ctx.moveTo(s.x%W,s.y);ctx.lineTo(s.x%W,s.y+s.spd*3);ctx.stroke();
    }
  });

  // Super overlay
  if(superActive){
    ctx.fillStyle=`rgba(255,240,0,${Math.sin(frame*.3)*.04+.03})`;
    ctx.fillRect(0,0,W,H);
    let eg=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.8);
    eg.addColorStop(0,'transparent');
    eg.addColorStop(1,'rgba(255,200,0,.15)');
    ctx.fillStyle=eg;
    ctx.fillRect(0,0,W,H);
  }

  // Pickups
  pickups.forEach(p=>{
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);
    let sz=14;
    ctx.shadowBlur=16;ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz,0);ctx.lineTo(0,sz);ctx.lineTo(-sz,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.beginPath();ctx.moveTo(0,-sz*.4);ctx.lineTo(sz*.4,0);ctx.lineTo(0,sz*.4);ctx.lineTo(-sz*.4,0);ctx.closePath();ctx.fill();
    ctx.restore();
    ctx.strokeStyle=p.color;ctx.lineWidth=1;
    ctx.globalAlpha=(p.life%40)/40*.5;
    ctx.beginPath();ctx.arc(p.x,p.y,(1-(p.life%40)/40)*30,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  });

  // Particles
  particles.forEach(p=>{
    let a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    if(p.type==='ring'){
      ctx.strokeStyle=p.color;ctx.lineWidth=2;
      ctx.shadowBlur=10;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    } else if(p.type==='flash'){
      let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      g.addColorStop(0,`rgba(255,255,255,${a})`);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
    } else {
      ctx.fillStyle=p.color;
      ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*a+.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  });

  // Lightning
  lightning.forEach(l=>{
    let a=l.life/l.maxLife;
    ctx.globalAlpha=a;
    ctx.strokeStyle=l.color;ctx.lineWidth=l.width;
    ctx.shadowBlur=12;ctx.shadowColor=l.color;
    ctx.beginPath();
    l.segs.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);});
    ctx.stroke();
    ctx.lineWidth=l.width*.3;ctx.strokeStyle='#fff';
    ctx.beginPath();
    l.segs.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);});
    ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  });

  // Enemy bullets
  enemyBullets.forEach(b=>{
    ctx.shadowBlur=10;ctx.shadowColor=b.color;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*.4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // Boss bullets
  bossBullets.forEach(b=>{
    ctx.shadowBlur=15;ctx.shadowColor=b.color;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    if(b.type==='homing'){
      ctx.strokeStyle='#fff';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.stroke();
    }
    ctx.shadowBlur=0;
  });

  // Player bullets
  bullets.forEach(b=>{
    ctx.shadowBlur=12;ctx.shadowColor=b.color;
    b.trail.forEach((t,i)=>{
      let a=(i/b.trail.length)*.5;
      ctx.globalAlpha=a;
      ctx.fillStyle=b.color;
      ctx.beginPath();ctx.arc(t.x,t.y,(b.w||3)*(i/b.trail.length)*.7,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.fillStyle=b.color;
    if(b.type==='spread'){
      ctx.beginPath();ctx.arc(b.x,b.y,b.w,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    }
    if(b.glow){
      let g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.w*3);
      g.addColorStop(0,b.color+'aa');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.fillRect(b.x-b.w*3,b.y-b.h,b.w*6,b.h*2);
    }
    ctx.shadowBlur=0;
  });

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive) return;
    if(frame<e.spawnTime) return;
    ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.angle);
    let flash=e.hitFlash>0;
    ctx.shadowBlur=20;ctx.shadowColor=flash?'#fff':e.color;
    ctx.strokeStyle=flash?'#fff':e.color;
    ctx.fillStyle=flash?'rgba(255,255,255,.3)':e.color+'33';
    ctx.lineWidth=2;
    if(e.type==='scout'){
      ctx.beginPath();ctx.moveTo(0,-e.size);ctx.lineTo(e.size*.7,e.size*.5);ctx.lineTo(-e.size*.7,e.size*.5);ctx.closePath();
      ctx.fill();ctx.stroke();
    } else if(e.type==='fighter'){
      ctx.beginPath();ctx.moveTo(0,-e.size*.8);ctx.lineTo(e.size,e.size*.4);ctx.lineTo(e.size*.4,0);ctx.lineTo(-e.size*.4,0);ctx.lineTo(-e.size,e.size*.4);ctx.closePath();
      ctx.fill();ctx.stroke();
    } else if(e.type==='bomber'){
      ctx.beginPath();
      for(let i=0;i<5;i++){let a=(i/5)*Math.PI*2-Math.PI/2;ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size);}
      ctx.closePath();ctx.fill();ctx.stroke();
    } else if(e.type==='carrier'){
      ctx.beginPath();
      for(let i=0;i<6;i++){let a=(i/6)*Math.PI*2;ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size);}
      ctx.closePath();ctx.fill();ctx.stroke();
    } else if(e.type==='elite'){
      ctx.save();ctx.rotate(Math.PI/4);
      ctx.beginPath();ctx.rect(-e.size*.7,-e.size*.7,e.size*1.4,e.size*1.4);ctx.fill();ctx.stroke();
      ctx.restore();
      ctx.beginPath();ctx.moveTo(0,-e.size*.9);ctx.lineTo(e.size*.9,0);ctx.lineTo(0,e.size*.9);ctx.lineTo(-e.size*.9,0);ctx.closePath();ctx.fill();ctx.stroke();
    } else if(e.type==='bonus'){
      ctx.beginPath();ctx.arc(0,0,e.size,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle=flash?'#fff':'#ff0';
      ctx.font=`bold ${e.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('★',0,2);
    }
    if(e.hp<e.maxHp){
      let pct=e.hp/e.maxHp;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-e.size,-e.size-8,e.size*2,5);
      ctx.fillStyle=pct>.5?'#0f5':'#f50';
      ctx.fillRect(-e.size,-e.size-8,e.size*2*pct,5);
    }
    ctx.restore();
  });

  // Boss
  if(boss&&boss.alive){
    ctx.save();ctx.translate(boss.x,boss.y);
    let flash=boss.hitFlash>0;
    ctx.shadowBlur=40;ctx.shadowColor=flash?'#fff':boss.color;
    ctx.strokeStyle=boss.color;ctx.lineWidth=2;ctx.globalAlpha=.4;
    ctx.beginPath();ctx.arc(0,0,boss.size+20+Math.sin(frame*.05)*5,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.rotate(boss.angle);
    ctx.strokeStyle=flash?'#fff':boss.color;
    ctx.fillStyle=flash?'rgba(255,255,255,.4)':boss.color+'44';
    ctx.lineWidth=3;
    for(let layer=0;layer<3;layer++){
      ctx.save();ctx.rotate(layer*Math.PI/6);
      let sz=boss.size-layer*15;
      ctx.beginPath();
      for(let i=0;i<8;i++){
        let a=(i/8)*Math.PI*2;
        let r=i%2===0?sz:sz*.6;
        ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      if(layer===0){ctx.fill();}
      ctx.stroke();
      ctx.restore();
    }
    let cg=ctx.createRadialGradient(0,0,0,0,0,boss.size*.35);
    cg.addColorStop(0,'#fff');cg.addColorStop(.5,boss.color);cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.arc(0,0,boss.size*.35,0,Math.PI*2);ctx.fill();
    if(boss.phase===2){
      ctx.globalAlpha=Math.sin(frame*.1)*.3+.1;
      ctx.strokeStyle='#f00';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(0,0,boss.size+35,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    }
    ctx.restore();
  }

  // Player
  if(!player.dead){
    ctx.save();ctx.translate(player.x,player.y);

    // Engine trail
    player.trail.forEach((t,i)=>{
      let a=(i/player.trail.length)*.5;
      let sz=(i/player.trail.length)*8;
      ctx.globalAlpha=a;
      ctx.fillStyle='#0af';
      ctx.shadowBlur=10;ctx.shadowColor='#0af';
      ctx.beginPath();ctx.arc(t.x-player.x,t.y-player.y+player.h/2,sz,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;ctx.shadowBlur=0;

    if(player.invincible>0 && Math.floor(frame/4)%2===0){ctx.restore();return;}

    if(player.shield>10){
      ctx.globalAlpha=player.shield/player.maxShield*.3;
      ctx.strokeStyle='#0af';ctx.lineWidth=2;
      ctx.shadowBlur=15;ctx.shadowColor='#0af';
      ctx.beginPath();ctx.arc(0,0,player.w*.8,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }

    if(superActive){
      let sg=ctx.createRadialGradient(0,0,0,0,0,player.w*1.5);
      sg.addColorStop(0,'rgba(255,220,0,.4)');sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg;
      ctx.beginPath();ctx.arc(0,0,player.w*1.5,0,Math.PI*2);ctx.fill();
    }

    let jc=WEAPONS[currentWeapon].color;
    let fw=6+(Math.sin(frame*.3))*2;
    ctx.shadowBlur=20;ctx.shadowColor=jc;
    let fg=ctx.createLinearGradient(0,player.h*.3,0,player.h*.3+30+fw*2);
    fg.addColorStop(0,jc);fg.addColorStop(.5,'#ff0');fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;
    ctx.beginPath();ctx.moveTo(-6,player.h*.3);ctx.lineTo(0,player.h*.3+30+fw*2);ctx.lineTo(6,player.h*.3);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-14,player.h*.25);ctx.lineTo(-12,player.h*.25+18+fw);ctx.lineTo(-8,player.h*.25);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(14,player.h*.25);ctx.lineTo(12,player.h*.25+18+fw);ctx.lineTo(8,player.h*.25);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;

    ctx.shadowBlur=25;ctx.shadowColor='#0af';
    let bg2=ctx.createLinearGradient(0,-player.h/2,0,player.h/2);
    bg2.addColorStop(0,'#4af');bg2.addColorStop(.4,'#08f');bg2.addColorStop(1,'#026');
    ctx.fillStyle=bg2;
    ctx.beginPath();
    ctx.moveTo(0,-player.h/2);
    ctx.lineTo(player.w*.4,-player.h*.1);
    ctx.lineTo(player.w/2,player.h*.2);
    ctx.lineTo(player.w*.3,player.h/2);
    ctx.lineTo(0,player.h*.35);
    ctx.lineTo(-player.w*.3,player.h/2);
    ctx.lineTo(-player.w/2,player.h*.2);
    ctx.lineTo(-player.w*.4,-player.h*.1);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#8df';ctx.lineWidth=1.5;ctx.stroke();
    let cg2=ctx.createRadialGradient(0,-player.h*.15,0,0,-player.h*.15,player.w*.2);
    cg2.addColorStop(0,'rgba(150,220,255,.9)');cg2.addColorStop(1,'rgba(0,50,120,.6)');
    ctx.fillStyle=cg2;
    ctx.beginPath();ctx.ellipse(0,-player.h*.12,player.w*.15,player.h*.16,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#056';
    ctx.beginPath();ctx.moveTo(player.w*.4,-player.h*.05);ctx.lineTo(player.w*.9,player.h*.1);ctx.lineTo(player.w*.3,player.h*.3);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(-player.w*.4,-player.h*.05);ctx.lineTo(-player.w*.9,player.h*.1);ctx.lineTo(-player.w*.3,player.h*.3);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;

    ctx.fillStyle=WEAPONS[currentWeapon].color;
    ctx.shadowBlur=8;ctx.shadowColor=WEAPONS[currentWeapon].color;
    ctx.beginPath();ctx.arc(0,player.h*.05,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    ctx.restore();
  }

  // Crosshair cursor
  ctx.save();
  ctx.strokeStyle='rgba(0,180,255,.8)';ctx.lineWidth=1.5;
  let cs=10;
  ctx.beginPath();
  ctx.moveTo(mouseX-cs-4,mouseY);ctx.lineTo(mouseX-2,mouseY);
  ctx.moveTo(mouseX+2,mouseY);ctx.lineTo(mouseX+cs+4,mouseY);
  ctx.moveTo(mouseX,mouseY-cs-4);ctx.lineTo(mouseX,mouseY-2);
  ctx.moveTo(mouseX,mouseY+2);ctx.lineTo(mouseX,mouseY+cs+4);
  ctx.stroke();
  ctx.beginPath();ctx.arc(mouseX,mouseY,cs*.5,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,180,255,.4)';ctx.stroke();
  ctx.restore();

  ctx.restore(); // screen shake
}

// ===== MAIN LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

initBg();
updateHUD();
loop();
</script>
</body>
